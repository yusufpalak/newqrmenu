version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qrmenu_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-qrmenu}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - qrmenu_network

  minio:
    image: minio/minio:latest
    container_name: qrmenu_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrmenu_network

  minio-init:
    image: minio/mc:latest
    container_name: qrmenu_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb -p local/${S3_BUCKET:-qrmenu} || true;
      mc anonymous set download local/${S3_BUCKET:-qrmenu};
      exit 0;
      "
    networks:
      - qrmenu_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrmenu_backend
    ports:
      - "3002:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-qrmenu}
      DB_SYNC: ${DB_SYNC:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-strong-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      CORS_ORIGIN: http://localhost:3003,http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-qrmenu}
      S3_FORCE_PATH_STYLE: 'true'
      S3_USE_PRESIGNED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - qrmenu_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qrmenu_frontend
    ports:
      - "3003:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3002
      NUXT_PRIVATE_API_BASE: http://backend:3001
    depends_on:
      - backend
    networks:
      - qrmenu_network

volumes:
  postgres_data:
  minio_data:

networks:
  qrmenu_network:
    driver: bridge
