services:
  db:
    image: postgres:16-alpine
    container_name: qrmenu_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-qrmenu}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qrmenu_network

  minio:
    image: minio/minio:latest
    container_name: qrmenu_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qrmenu_network

  minio-init:
    image: minio/mc:latest
    container_name: qrmenu_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; mc mb -p local/${S3_BUCKET} || true; mc anonymous set download local/${S3_BUCKET}; exit 0; "
    networks:
      - qrmenu_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrmenu_backend
    ports:
      - "3002:3001"
    environment:
      DB_HOST: ${DB_HOST:-yusufpalak-postgres}
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNC: ${DB_SYNC}
      DB_LOGGING: ${DB_LOGGING}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: 3001
      CORS_ORIGIN: http://localhost:3003,http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-https://qr.kernelasoft.com}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: 'true'
      S3_USE_PRESIGNED: 'false'
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - app_net
      - qrmenu_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qrmenu_frontend
    ports:
      - "3003:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://qr.kernelasoft.com}
      NUXT_PRIVATE_API_BASE: http://backend:3001
    depends_on:
      - backend
    networks:
      - app_net
      - qrmenu_network

  nginx:
    image: nginx:alpine
    container_name: qrmenu_nginx
    ports:
      - "8084:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_net
      - qrmenu_network

volumes:
  minio_data:
  postgres_data:

networks:
  qrmenu_network:
    driver: bridge
  app_net:
    name: yusufpalakcomtr_app_net
    external: true
