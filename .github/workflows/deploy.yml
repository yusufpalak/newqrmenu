# VPS üzerinde SSH ile dağıtım.
#
# GitHub → Settings → Secrets and variables → Actions içinde şu repository secret'larını tanımlayın:
#   PROJECT_PATH  — Projeyi sunucuda tuttuğunuz dizin (örn. /var/www/newqrmenu)
#   VPS_HOST      — Sunucu hostname veya IP
#   VPS_PORT      — SSH portu (örn. 22)
#   VPS_SSH_KEY   — Deploy için kullanılan private key (tam içerik, -----BEGIN ... END----- dahil)
#   VPS_USER      — SSH kullanıcı adı
#
# İsteğe bağlı: varsayılan dalı değiştirmek için aşağıdaki DEPLOY_BRANCH env'ini düzenleyin.

name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  DEPLOY_BRANCH: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.PROJECT_PATH }}"
            git fetch origin
            git checkout "${{ env.DEPLOY_BRANCH }}"
            git pull origin "${{ env.DEPLOY_BRANCH }}"
              docker compose up -d --build